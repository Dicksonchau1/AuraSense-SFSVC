<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" fill="none">
  <defs>
    <linearGradient id="g" x1="30" y1="58" x2="30" y2="2" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>
  <!-- Edges -->
  <g stroke="url(#g)" stroke-width="1.4" stroke-linecap="round">
    <!-- outer left leg -->
    <line x1="8" y1="55" x2="16" y2="40"/>
    <line x1="16" y1="40" x2="22" y2="28"/>
    <line x1="22" y1="28" x2="26" y2="18"/>
    <line x1="26" y1="18" x2="30" y2="8"/>
    <!-- outer right leg -->
    <line x1="52" y1="55" x2="44" y2="40"/>
    <line x1="44" y1="40" x2="38" y2="28"/>
    <line x1="38" y1="28" x2="34" y2="18"/>
    <line x1="34" y1="18" x2="30" y2="8"/>
    <!-- crossbars -->
    <line x1="8" y1="55" x2="52" y2="55"/>
    <line x1="16" y1="40" x2="44" y2="40"/>
    <line x1="22" y1="28" x2="38" y2="28"/>
    <line x1="26" y1="18" x2="34" y2="18"/>
    <!-- inner left diagonals -->
    <line x1="16" y1="40" x2="24" y2="55"/>
    <line x1="22" y1="28" x2="30" y2="40"/>
    <line x1="26" y1="18" x2="30" y2="28"/>
    <!-- inner right diagonals -->
    <line x1="44" y1="40" x2="36" y2="55"/>
    <line x1="38" y1="28" x2="30" y2="40"/>
    <line x1="34" y1="18" x2="30" y2="28"/>
    <!-- mid verticals / extra mesh -->
    <line x1="24" y1="55" x2="22" y2="28"/>
    <line x1="36" y1="55" x2="38" y2="28"/>
    <line x1="30" y1="40" x2="30" y2="28"/>
    <line x1="24" y1="55" x2="36" y2="55"/>
  </g>
  <!-- Nodes -->
  <g fill="url(#g)">
    <circle cx="30" cy="8"  r="2.6"/>
    <circle cx="26" cy="18" r="2.2"/>
    <circle cx="34" cy="18" r="2.2"/>
    <circle cx="22" cy="28" r="2.2"/>
    <circle cx="30" cy="28" r="2.2"/>
    <circle cx="38" cy="28" r="2.2"/>
    <circle cx="16" cy="40" r="2.2"/>
    <circle cx="30" cy="40" r="2.2"/>
    <circle cx="44" cy="40" r="2.2"/>
    <circle cx="8"  cy="55" r="2.6"/>
    <circle cx="24" cy="55" r="2.2"/>
    <circle cx="36" cy="55" r="2.2"/>
    <circle cx="52" cy="55" r="2.6"/>
  </g>
</svg>
